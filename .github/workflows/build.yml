name: Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            name: macOS
          - os: windows-latest
            name: Windows

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.name }})

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Generate icons (macOS)
        if: runner.os == 'macOS'
        run: python assets/gen_icons.py

      - name: Generate icons (Windows)
        if: runner.os == 'Windows'
        run: python assets/gen_icons.py

      - name: Build
        run: python build.py

      - name: Upload macOS DMG
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4.6.2
        with:
          name: Music-Librarian-macOS
          path: dist/*.dmg
          retention-days: 30

      - name: Upload Windows ZIP
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4.6.2
        with:
          name: Music-Librarian-Windows
          path: dist/*.zip
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4.3.0
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
